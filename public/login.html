<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connexion — Prospection Garages</title>
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="apple-touch-icon" href="/favicon.png" />
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
      font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #0f1420; color: #e8edf6;
    }
    .box {
      background: #1a2130; border: 1px solid #2e3a52; border-radius: 14px;
      padding: 32px; width: 100%; max-width: 360px; box-shadow: 0 12px 40px rgba(0,0,0,.5);
    }
    .logo { font-size: 34px; text-align: center; }
    .logo img { height: 54px; width: auto; margin: 0 auto 6px; display: block; }
    h1 { font-size: 20px; margin: 8px 0 4px; text-align: center; }
    p.sub { color: #9aa8c0; font-size: 13px; text-align: center; margin: 0 0 22px; }
    label { display: block; font-size: 13px; font-weight: 600; color: #9aa8c0; margin-bottom: 6px; }
    input {
      width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #2e3a52;
      background: #222b3d; color: #e8edf6; font-size: 15px;
    }
    input:focus { outline: 2px solid #4f8cff; border-color: #4f8cff; }
    button {
      width: 100%; margin-top: 16px; padding: 12px; border: none; border-radius: 8px;
      background: #4f8cff; color: #fff; font-size: 15px; font-weight: 700; cursor: pointer;
    }
    button:hover { filter: brightness(1.1); }
    button:disabled { opacity: .6; cursor: not-allowed; }
    .err { color: #ff5c72; font-size: 13px; margin-top: 12px; min-height: 18px; text-align: center; }
  </style>
</head>
<body>
  <div class="box">
    <div class="logo"><img src="/logo-bifco.png" alt="Bifco" /></div>
    <h1>Prospection Garages</h1>
    <p class="sub">Entre ton mot de passe pour accéder à l'application.</p>
    <form id="f">
      <label for="pw">Mot de passe</label>
      <input id="pw" type="password" autofocus autocomplete="current-password" />
      <button id="btn" type="submit">Se connecter</button>
      <div class="err" id="err"></div>
    </form>
  </div>
  <script>
    const f = document.getElementById('f');
    const err = document.getElementById('err');
    const btn = document.getElementById('btn');
    f.addEventListener('submit', async (e) => {
      e.preventDefault();
      err.textContent = '';
      btn.disabled = true;
      try {
        const r = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: document.getElementById('pw').value }),
        });
        const j = await r.json();
        if (j.ok) {
          window.location.href = '/';
        } else {
          err.textContent = j.error || 'Mot de passe incorrect';
          btn.disabled = false;
        }
      } catch (_) {
        err.textContent = 'Erreur de connexion';
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
